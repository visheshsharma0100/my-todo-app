<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="auth.css">
    <script>
        async function signin() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if (!username.trim() || !password.trim()) {
        msg.className = "error";
        msg.innerText = "Please fill in all fields.";
        return;
    }

    try {
        const response = await axios.post("https://todo-web-app-jhbm.onrender.com/signin", {
            username,
            password
        });

        const token = response.data.token;

        // token localStorage me save karo
        localStorage.setItem("token", token);

        msg.className = "success";
        msg.innerText = "Signed in! Redirecting...";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);

    } catch (err) {
        msg.className = "error";
        msg.innerText = err.response?.data?.message || "Invalid credentials.";
    }
}
    </script>
</head>
<body>
    <div id="container">
        <h2>Sign In</h2>

        <input id="username" type="text" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="signin()">Sign In</button>

        <p>Don't have an account? <a href="signup.html">Sign up</a></p>

        <p id="msg"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="signin.js"></script>
</body>
</html>
